services:
  discord-bot:
    build: .
    image: discord-bot:latest
    container_name: discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - OWNER_ID=${OWNER_ID}
      - DEFAULT_PREFIX=${DEFAULT_PREFIX:-,}
      - DATABASE_PATH=${DATABASE_PATH:-data/bot.db}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - GEMINI_FALLBACK_MODELS=${GEMINI_FALLBACK_MODELS:-gemini-1.5-flash-8b,gemini-2.0-flash}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
      - ./static:/app/static
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
