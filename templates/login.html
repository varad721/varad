<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard Login</title>
    <style>
        :root {
            --bg: #101318;
            --panel: #171b22;
            --line: #303846;
            --text: #eef2f7;
            --muted: #9aa7b8;
            --brand: #5865f2;
            --bad: #ef5960;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Segoe UI, system-ui, Arial, sans-serif;
            padding: 20px;
        }

        .login {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 24px;
        }

        .mark {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: var(--brand);
            display: grid;
            place-items: center;
            font-weight: 800;
            margin-bottom: 14px;
        }

        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0 0 18px; color: var(--muted); }

        label {
            display: block;
            color: var(--muted);
            margin-bottom: 6px;
            font-size: 13px;
        }

        input, button {
            width: 100%;
            border-radius: 8px;
            padding: 11px;
            font: inherit;
        }

        input {
            background: #0f1217;
            color: var(--text);
            border: 1px solid var(--line);
            margin-bottom: 12px;
        }

        button {
            background: var(--brand);
            color: white;
            border: 1px solid var(--brand);
            cursor: pointer;
        }

        .error {
            display: none;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(239, 89, 96, .5);
            color: #ffdce0;
        }

        .hint {
            margin-top: 14px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        code {
            background: #0f1217;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 2px 6px;
            color: #cbd5ff;
        }
    </style>
</head>
<body>
    <main class="login">
        <div class="mark">B</div>
        <h1>Bot Dashboard</h1>
        <p>Login with an owner Discord user ID from your `.env`.</p>
        <div class="error" id="error"></div>
        <form id="form">
            <label for="user_id">Discord User ID</label>
            <input id="user_id" autocomplete="off" placeholder="123456789012345678" required>
            <button type="submit">Login</button>
        </form>
        <div class="hint">Enable Discord Developer Mode, right-click your profile, copy User ID, and make sure it is listed in <code>OWNER_ID</code>.</div>
    </main>
    <script>
        document.getElementById('form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const error = document.getElementById('error');
            error.style.display = 'none';
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: document.getElementById('user_id').value})
            });
            const data = await response.json();
            if (data.status === 'success') {
                location.href = '/';
            } else {
                error.textContent = data.message || 'Login failed.';
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
