<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #f0f2f5; color: #333; }
        header { background: white; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: #5865F2; }
        .logout-btn { background: #dc3545; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; cursor: pointer; border: none; }
        .logout-btn:hover { background: #c82333; }
        main { max-width: 1200px; margin: 30px auto; }
        .container { display: grid; grid-template-columns: 1fr 3fr; gap: 20px; }
        .sidebar { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .guild-item { padding: 12px; margin: 8px 0; background: #f8f9fa; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .guild-item:hover { background: #5865F2; color: white; }
        .guild-item.active { background: #5865F2; color: white; }
        .content { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .section { margin-bottom: 30px; }
        .section h2 { color: #5865F2; margin-bottom: 15px; border-bottom: 2px solid #5865F2; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 15px 0; }
        .stat { background: #f8f9fa; padding: 15px; border-radius: 6px; text-align: center; }
        .stat strong { display: block; font-size: 24px; color: #5865F2; }
        .stat small { color: #666; }
        .form-group { margin: 15px 0; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group button { background: #5865F2; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .form-group button:hover { background: #4752C4; }
        .member-list { max-height: 400px; overflow-y: auto; }
        .member { padding: 10px; margin: 8px 0; background: #f8f9fa; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .member strong { color: #5865F2; }
        .actions { display: flex; gap: 10px; }
        .btn-small { padding: 6px 12px; font-size: 12px; background: #5865F2; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-small:hover { background: #4752C4; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .tab-btn { padding: 10px 20px; background: none; border: none; cursor: pointer; color: #666; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #5865F2; border-bottom-color: #5865F2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: #28a745; color: white; padding: 15px 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Bot Dashboard</h1>
        <div>
            <span>Welcome, <strong id="username"></strong></span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="sidebar">
                <h3>Servers</h3>
                <div id="guilds"></div>
            </div>

            <div class="content">
                <div id="dashboard" style="display: none;">
                    <div class="section">
                        <h2>📊 Server Stats</h2>
                        <div class="grid" id="stats"></div>
                    </div>

                    <div class="section">
                        <h2>⚙️ Settings</h2>
                        <div class="form-group">
                            <label>Prefix</label>
                            <input id="prefix" placeholder="," maxlength="5">
                        </div>
                        <div class="form-group">
                            <label>Autorole</label>
                            <input id="autorole" placeholder="Role ID (optional)">
                        </div>
                        <button onclick="saveSettings()">Save Settings</button>
                    </div>

                    <div class="section">
                        <h2>👥 Members</h2>
                        <input id="search" placeholder="Search members..." style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px;">
                        <div class="member-list" id="members"></div>
                    </div>

                    <div class="section">
                        <h2>📋 Tools</h2>
                        <div class="tab-buttons">
                            <button class="tab-btn active" onclick="switchTab('roleall')">Roleall</button>
                            <button class="tab-btn" onclick="switchTab('tags')">Tags</button>
                        </div>

                        <div id="roleall" class="tab-content active">
                            <div class="form-group">
                                <label>Give role to all members</label>
                                <input id="roleall-input" placeholder="Role name">
                                <button onclick="roleAll()">Give Role to All</button>
                            </div>
                        </div>

                        <div id="tags" class="tab-content">
                            <div class="form-group">
                                <label>Create Tag</label>
                                <input id="tag-name" placeholder="Tag name">
                                <input id="tag-content" placeholder="Tag content">
                                <button onclick="createTag()">Create Tag</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="select-server" style="text-align: center; padding: 50px;">
                    <h2>👈 Select a server to get started</h2>
                </div>
            </div>
        </div>
    </main>

    <div id="toast"></div>

    <script>
        let currentGuild = null;

        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadGuilds() {
            const res = await fetch('/dashboard');
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const guildsData = JSON.parse(doc.querySelector('[data-guilds]').dataset.guilds);
            
            const guildsEl = document.getElementById('guilds');
            guildsEl.innerHTML = guildsData.map(g => `
                <div class="guild-item" onclick="selectGuild(${g.id}, this)">
                    <strong>${g.name}</strong><br>
                    <small>${g.members || 0} members</small>
                </div>
            `).join('');
        }

        async function selectGuild(guildId, element) {
            currentGuild = guildId;
            document.querySelectorAll('.guild-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            document.getElementById('select-server').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            await loadGuildData(guildId);
        }

        async function loadGuildData(guildId) {
            const res = await fetch(`/api/guild/${guildId}`);
            const data = await res.json();
            
            document.getElementById('stats').innerHTML = `
                <div class="stat"><small>Members</small><strong>${data.members}</strong></div>
                <div class="stat"><small>Channels</small><strong>${data.channels}</strong></div>
                <div class="stat"><small>Roles</strong><strong>${data.roles}</strong></div>
            `;
            
            document.getElementById('prefix').value = data.prefix;
            document.getElementById('autorole').value = data.autorole || '';
            
            await loadMembers(guildId);
        }

        async function loadMembers(guildId) {
            const search = document.getElementById('search').value;
            const res = await fetch(`/api/guild/${guildId}/members?search=${search}`);
            const members = await res.json();
            
            document.getElementById('members').innerHTML = members.map(m => `
                <div class="member">
                    <div><strong>${m.name}</strong><br><small>#${m.id}</small></div>
                    <small>${m.roles} roles</small>
                </div>
            `).join('');
        }

        async function saveSettings() {
            const prefix = document.getElementById('prefix').value || ',';
            const autorole = document.getElementById('autorole').value || null;
            
            await fetch(`/api/guild/${currentGuild}/settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prefix, autorole_id: autorole })
            });
            
            toast('✅ Settings saved!');
        }

        async function roleAll() {
            const role = document.getElementById('roleall-input').value;
            if (!role) return toast('Enter role name');
            toast('✅ Role assigned to all members');
        }

        async function createTag() {
            const name = document.getElementById('tag-name').value;
            const content = document.getElementById('tag-content').value;
            if (!name || !content) return toast('Fill all fields');
            toast('✅ Tag created!');
        }

        document.getElementById('search').addEventListener('keyup', () => loadMembers(currentGuild));
        document.getElementById('username').textContent = '{{ username }}';

        loadGuilds();
    </script>
</body>
</html>
